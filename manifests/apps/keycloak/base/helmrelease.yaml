apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Source 1: Bitnami Keycloak Helm Chart
    - repoURL: https://charts.bitnami.com/bitnami
      chart: keycloak
      targetRevision: "25.x.x"
      helm:
        releaseName: keycloak
        valueFiles:
          - $values/resources/apps/keycloak/values.yaml
    
    # Source 2: ConfigCLI Job and other manifests
    - repoURL: https://github.com/GivenCloud/Proyecto-Keycloak.git
      path: manifests/apps/keycloak
      targetRevision: main
    
    # Source 3: Sealed secrets and extra manifests from resources
    - repoURL: https://github.com/GivenCloud/Proyecto-Keycloak.git
      path: resources/apps/keycloak/secrets
      targetRevision: main

    # Source 4: Values reference
    - repoURL: https://github.com/GivenCloud/Proyecto-Keycloak.git
      targetRevision: main
      ref: values
  
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - Replace=false
  
  revisionHistoryLimit: 3