# Job to configure Keycloak via CLI
# Se ejecuta automáticamente DESPUÉS del despliegue de ArgoCD (PostSync hook)
# Si cambias el ConfigMap y haces sync, el Job se re-ejecuta
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-configcli
  namespace: keycloak
  labels:
    app: keycloak
    component: config
  annotations:
    # Hooks de ArgoCD: se ejecuta POST sincronización
    argocd.argoproj.io/hook: PostSync
    # Ejecutar después del despliegue principal
    argocd.argoproj.io/sync-wave: "10"
    # Mantener el Job para revisar estado y logs (debug)
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 600
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: keycloak
        component: config
    spec:
      serviceAccountName: keycloak-configcli
      restartPolicy: Never
      initContainers:
        - name: wait-for-keycloak
          image: curlimages/curl:7.85.0
          command: ['sh', '-c']
          args:
            - |
              START_TIME=$(date +%s)
              TIMEOUT_SECONDS=300
              until curl -f http://keycloak:80/realms/master > /dev/null 2>&1; do
                NOW=$(date +%s)
                ELAPSED=$((NOW - START_TIME))
                if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
                  echo "Timeout waiting for Keycloak readiness after ${TIMEOUT_SECONDS}s"
                  exit 1
                fi
                echo "Waiting for Keycloak to be ready..."
                sleep 5
              done
              echo "Keycloak is ready!"
      containers:
        - name: keycloak-cli
          image: docker.io/bitnamilegacy/keycloak:26.3.3-debian-12-r0
          imagePullPolicy: IfNotPresent
          env:
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-creds
                  key: password
                  optional: true
            - name: KEYCLOAK_HOST
              value: "http://keycloak:80"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting Keycloak configuration..."
              
              REALM_NAME="demo"
              KC_ADMIN_URL="${KEYCLOAK_HOST:-http://keycloak:80}"
              KC_USER="${KEYCLOAK_ADMIN:-admin}"
              KC_PASSWORD="${KEYCLOAK_ADMIN_PASSWORD:-changeme123!}"
              
              echo "Authenticating with Keycloak at $KC_ADMIN_URL..."
              
              TOKEN=$(curl -s -X POST \
                "${KC_ADMIN_URL}/realms/master/protocol/openid-connect/token" \
                -d "client_id=admin-cli" \
                -d "username=${KC_USER}" \
                -d "password=${KC_PASSWORD}" \
                -d "grant_type=password" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              
              if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
                echo "Failed to authenticate with Keycloak"
                exit 1
              fi
              
              echo "Authentication successful!"
              
              REALM_EXISTS=$(curl -s -H "Authorization: Bearer $TOKEN" \
                "${KC_ADMIN_URL}/admin/realms/${REALM_NAME}" -o /dev/null -w "%{http_code}")

              if [ "$REALM_EXISTS" = "200" ]; then
                echo "Realm '${REALM_NAME}' already exists. Updating configuration..."
                UPDATE_CODE=$(curl -s -o /tmp/realm-update-response.json -w "%{http_code}" -X PUT \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d @/config/demo-realm.json \
                  "${KC_ADMIN_URL}/admin/realms/${REALM_NAME}")
                if [ "$UPDATE_CODE" != "204" ] && [ "$UPDATE_CODE" != "200" ]; then
                  echo "Failed to update realm '${REALM_NAME}' (HTTP ${UPDATE_CODE})"
                  cat /tmp/realm-update-response.json || true
                  exit 1
                fi
              else
                echo "Creating realm '${REALM_NAME}'..."
                CREATE_CODE=$(curl -s -o /tmp/realm-create-response.json -w "%{http_code}" -X POST \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d @/config/demo-realm.json \
                  "${KC_ADMIN_URL}/admin/realms")
                if [ "$CREATE_CODE" != "201" ] && [ "$CREATE_CODE" != "409" ]; then
                  echo "Failed to create realm '${REALM_NAME}' (HTTP ${CREATE_CODE})"
                  cat /tmp/realm-create-response.json || true
                  exit 1
                fi
                if [ "$CREATE_CODE" = "409" ]; then
                  echo "Realm '${REALM_NAME}' already exists (HTTP 409). Continuing..."
                else
                  echo "Realm '${REALM_NAME}' created successfully!"
                fi
              fi
              
              echo "Verifying configuration..."
              VERIFY_CODE=$(curl -s -H "Authorization: Bearer $TOKEN" \
                "${KC_ADMIN_URL}/admin/realms/${REALM_NAME}" -o /dev/null -w "%{http_code}")
              if [ "$VERIFY_CODE" != "200" ]; then
                echo "Realm verification failed with HTTP ${VERIFY_CODE}"
                exit 1
              fi
              
              echo "Keycloak configuration completed successfully!"
          
          volumeMounts:
            - name: realm-config
              mountPath: /config
      
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config