# ConfigMap with Keycloak realm configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: keycloak
  labels:
    app: keycloak
    component: config
data:
  demo-realm.json: |
    {
      "realm": "demo",
      "displayName": "Demo Realm",
      "enabled": true,
      "sslRequired": "external",
      "loginTheme": "keycloak",
      "accountTheme": "keycloak",
      "adminTheme": "keycloak",
      "emailTheme": "keycloak",
      "defaultRoles": [
        "user",
        "offline_access"
      ],
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Administrator role"
          },
          {
            "name": "user",
            "description": "Standard user role"
          },
          {
            "name": "manager",
            "description": "Manager role"
          }
        ]
      },
      "clients": [
        {
          "clientId": "demo-app",
          "name": "Demo Application",
          "enabled": true,
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "demo-app-secret",
          "redirectUris": [
            "http://localhost:3000/*",
            "http://localhost:8080/*"
          ],
          "webOrigins": [
            "http://localhost:3000",
            "http://localhost:8080"
          ],
          "roles": {
            "client": [
              {
                "name": "read",
                "description": "Read access"
              },
              {
                "name": "write",
                "description": "Write access"
              },
              {
                "name": "delete",
                "description": "Delete access"
              }
            ]
          }
        }
      ],
      "clientScopes": [
        {
          "name": "profile",
          "description": "Información de perfil del usuario (nombre, email, etc)",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true",
            "consent.screen.text": "Profile"
          },
          "protocolMappers": [
            {
              "name": "name",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-userinfo-property-mapper",
              "consentRequired": false,
              "config": {
                "userinfo.token.claim": "true",
                "user.attribute": "name",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "name",
                "jsonType.label": "String"
              }
            }
          ]
        },
        {
          "name": "roles",
          "description": "REALM roles - permisos globales del usuario en el realm",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true"
          },
          "protocolMappers": [
            {
              "name": "realm roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "consentRequired": false,
              "config": {
                "access.token.claim": "true",
                "claim.name": "realm_access.roles",
                "jsonType.label": "String"
              }
            }
          ]
        },
        {
          "name": "client-roles",
          "description": "CLIENT roles - permisos específicos del usuario en cada app/cliente",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true"
          },
          "protocolMappers": [
            {
              "name": "client roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-client-role-mapper",
              "consentRequired": false,
              "config": {
                "access.token.claim": "true",
                "claim.name": "resource_access.${client_id}.roles",
                "jsonType.label": "String"
              }
            }
          ]
        }
      ]
    }
