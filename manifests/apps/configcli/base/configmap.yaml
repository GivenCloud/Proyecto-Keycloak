# ConfigMap with Keycloak realm configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: keycloak
  labels:
    app: keycloak
    component: config
data:
  demo-realm.json: |
    {
      "realm": "demo",
      "displayName": "Demo Realm",
      "enabled": true,
      "sslRequired": "external",
      "loginTheme": "keycloak",
      "accountTheme": "keycloak",
      "adminTheme": "keycloak",
      "emailTheme": "keycloak",
      "defaultRoles": [
        "user",
        "offline_access"
      ],
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Administrator role"
          },
          {
            "name": "user",
            "description": "Standard user role"
          },
          {
            "name": "manager",
            "description": "Manager role"
          }
        ],
        "client": {
          "demo-app": [
            {
              "name": "read",
              "description": "Read access"
            },
            {
              "name": "write",
              "description": "Write access"
            },
            {
              "name": "delete",
              "description": "Delete access"
            }
          ]
        }
      },
      "clients": [
        {
          "clientId": "demo-app",
          "name": "Demo Application",
          "enabled": true,
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "demo-app-secret",
          "redirectUris": [
            "http://localhost:3000/*",
            "http://localhost:8080/*"
          ],
          "webOrigins": [
            "http://localhost:3000",
            "http://localhost:8080"
          ]
        }
      ]
    }
