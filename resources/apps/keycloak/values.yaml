## Bitnami Keycloak Helm Chart Values
## https://github.com/bitnami/charts/tree/main/bitnami/keycloak

image:
  registry: docker.io
  repository: bitnamilegacy/keycloak
  tag: "26.3.3-debian-12-r0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Admin credentials
auth:
  adminUser: admin
  existingSecret: keycloak-helm-secrets
  passwordSecretKey: admin-password

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# PostgreSQL backend (recommended for production)
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "17.6.0-debian-12-r0"
  auth:
    username: keycloak
    database: keycloak
    existingSecret: keycloak-helm-secrets
    secretKeys:
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard

# Keycloak configuration
keycloak:
  extraEnvVars:
    - name: KC_DB
      value: postgres
    - name: KC_DB_URL_HOST
      value: keycloak-postgresql
    - name: KC_DB_URL_PORT
      value: "5432"
    - name: KC_DB_URL_DATABASE
      value: keycloak
    - name: KC_DB_USERNAME
      value: keycloak
    - name: KC_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-helm-secrets
          key: password
    - name: KC_PROXY
      value: "edge"
    - name: KC_HOSTNAME
      value: "keycloak.local"

# Built-in keycloak-config-cli job managed by the Bitnami chart
keycloakConfigCli:
  enabled: true
  configuration:
    demo-realm.json: |
      {
        "realm": "demo",
        "displayName": "Demo Realm",
        "enabled": true,
        "sslRequired": "external",
        "loginTheme": "keycloak",
        "accountTheme": "keycloak",
        "adminTheme": "keycloak",
        "emailTheme": "keycloak",
        "defaultRoles": [
          "user",
          "offline_access"
        ],
        "roles": {
          "realm": [
            {
              "name": "admin",
              "description": "Administrator role"
            },
            {
              "name": "user",
              "description": "Standard user role"
            },
            {
              "name": "manager",
              "description": "Manager role"
            }
          ],
          "client": {
            "demo-app": [
              {
                "name": "read",
                "description": "Read access"
              },
              {
                "name": "write",
                "description": "Write access"
              },
              {
                "name": "delete",
                "description": "Delete access"
              }
            ]
          }
        },
        "clientScopes": [
          {
            "name": "demo-scope",
            "description": "Client scope for demo-app",
            "protocol": "openid-connect",
            "attributes": {
              "include.in.token.scope": "true",
              "display.on.consent.screen": "false"
            }
          }
        ],
        "clients": [
          {
            "clientId": "demo-app",
            "name": "Demo Application",
            "enabled": true,
            "publicClient": false,
            "clientAuthenticatorType": "client-secret",
            "secret": "demo-app-secret",
            "redirectUris": [
              "http://localhost:3000/*",
              "http://localhost:8080/*"
            ],
            "webOrigins": [
              "http://localhost:3000",
              "http://localhost:8080"
            ],
            "defaultClientScopes": [
              "profile",
              "email",
              "roles",
              "web-origins",
              "demo-scope"
            ]
          }
        ]
      }

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Pod security context
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

# PVC for persistence
persistence:
  enabled: false  # Keycloak relies on PostgreSQL for data

# Liveness and readiness probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# Autoscaling (optional)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
